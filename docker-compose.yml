services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-privacy_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-privacy_db}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DJANGO_ENV: prod
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres@db:5432/privacy_db}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    expose:
      - "8000"
    volumes:
      - mediafiles:/app/media
      - staticfiles:/app/staticfiles
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/ops/health/"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/sentinel.conf:/etc/nginx/conf.d/default.conf:ro
      - staticfiles:/srv/sentinel/staticfiles:ro
      - mediafiles:/srv/sentinel/media:ro
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot

volumes:
  pgdata: {}
  redisdata: {}
  mediafiles: {}
  staticfiles: {}
  certbot_conf: {}
  certbot_www: {}

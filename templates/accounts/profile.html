{% extends 'base.html' %}
{% block title %}Profile{% endblock %}
{% block topbar_title %}Profile{% endblock %}
{% block content %}
<div class="card p-6 max-w-2xl">
  <h2 class="text-lg font-semibold">{{ user.friendly_name }}</h2>
  <p class="text-sm text-slate-500">{{ user.email }}</p>
  <div class="mt-4 text-sm">
    <p><span class="text-slate-500">Workspace:</span> <strong>{{ active_org.name }}</strong></p>
    <p><span class="text-slate-500">Role:</span> {{ active_membership.get_role_display }}</p>
  </div>
</div>
{% endblock %}

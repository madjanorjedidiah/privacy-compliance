# ═══════════════════════════════════════════════════════════════════════════
# Privacy Compliance — Standalone nginx
# ═══════════════════════════════════════════════════════════════════════════
# In the standalone compose, nginx is the edge: it terminates TLS, serves
# static + media, and reverse-proxies the rest to gunicorn.
#
# Certs are expected at /etc/nginx/certs (mounted from ./deploy/certs):
#   fullchain.pem   — leaf + intermediates
#   privkey.pem     — private key
#
# scripts/init-standalone.sh generates a self-signed cert there on first
# boot. For production, swap them for a Let's Encrypt cert by running
# `docker compose --profile letsencrypt up -d certbot`.
#
# For the shared-infra compose, this file is re-used but the TLS server
# block is harmless — NPM strips the TLS layer before traffic arrives.
# ═══════════════════════════════════════════════════════════════════════════

upstream django_backend {
    server privacy_django:8000;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=app:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=ops:10m rate=60r/s;

# ─────────────────────────────────────────────────────────────────────────
# HTTP :80 — ACME challenge + nginx health + redirect everything else.
# ─────────────────────────────────────────────────────────────────────────
server {
    listen 80 default_server;
    server_name _;

    # Plaintext nginx healthcheck (used by docker healthcheck, and by NPM
    # in the shared-infra deployment).
    location = /healthz {
        return 200 '{"status":"ok","service":"privacy-compliance"}';
        add_header Content-Type application/json;
    }

    # Let's Encrypt HTTP-01 challenge (certbot writes tokens here).
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    # Everything else: force HTTPS.
    location / {
        return 301 https://$host$request_uri;
    }
}

# ─────────────────────────────────────────────────────────────────────────
# HTTPS :443 — the real thing.
# ─────────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl default_server;
    http2 on;
    server_name _;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256';
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1h;

    client_max_body_size 12M;   # small headroom over Django MAX_EVIDENCE_FILE_BYTES (10 MiB)

    # Belt-and-braces security headers (Django already sets these too).
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy same-origin always;

    # ── Service healthcheck (public, unauthenticated) ────────────────────
    location = /healthz {
        return 200 '{"status":"ok","service":"privacy-compliance"}';
        add_header Content-Type application/json;
    }

    # ── Ops probes — fast, no rate limit burst impact ────────────────────
    location /ops/ {
        limit_req zone=ops burst=10 nodelay;
        proxy_pass http://django_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Request-ID $request_id;
        access_log off;
    }

    # ══════════════════════════════════════════════════════════════════════
    # Static & media (served directly by nginx)
    # ══════════════════════════════════════════════════════════════════════
    location /static/ {
        alias /srv/privacy/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /media/ {
        alias /srv/privacy/media/;
        expires 7d;
        add_header Cache-Control "private";

        # Only serve known-safe evidence file types directly.
        location ~* \.(pdf|png|jpg|jpeg|gif|webp|doc|docx|xls|xlsx|csv|txt|md|json|log)$ {
            try_files $uri =404;
        }

        # Deny dotfiles and anything else uploaded to media/.
        location ~ /\. { deny all; }
        return 403;
    }

    # ══════════════════════════════════════════════════════════════════════
    # Auth (strict rate limit)
    # ══════════════════════════════════════════════════════════════════════
    location ~ ^/accounts/(login|signup)/ {
        limit_req zone=auth burst=5 nodelay;
        proxy_pass http://django_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Request-ID $request_id;
    }

    # ══════════════════════════════════════════════════════════════════════
    # Everything else — Django views
    # ══════════════════════════════════════════════════════════════════════
    location / {
        limit_req zone=app burst=20 nodelay;
        proxy_pass http://django_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Request-ID $request_id;
        proxy_read_timeout 120s;
    }

    # ══════════════════════════════════════════════════════════════════════
    # Performance
    # ══════════════════════════════════════════════════════════════════════
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 860;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        image/svg+xml;
}

# ═══════════════════════════════════════════════════════════════════════════
# Sentinel — Internal Nginx
# ═══════════════════════════════════════════════════════════════════════════
# Sits behind Nginx Proxy Manager. NPM terminates TLS and forwards public
# traffic for mydataprotection.cocoatool.org to this container on port 80.
# This nginx handles static/media serving + upstream routing to gunicorn.
# ═══════════════════════════════════════════════════════════════════════════

upstream django_backend {
    server privacy_django:8000;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=app:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=ops:10m rate=60r/s;

server {
    listen 80;
    server_name _;

    client_max_body_size 25M;  # evidence uploads (capped at 10M in Django, headroom here)

    # Security headers (Django adds its own; these are a belt-and-braces layer).
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy same-origin always;

    # ── Health check (for NPM and the internal-nginx healthcheck) ────────
    location = /health {
        return 200 '{"status":"ok","service":"sentinel"}';
        add_header Content-Type application/json;
    }

    # ── Ops probes — fast, no rate limit burst impact ────────────────────
    location /ops/ {
        limit_req zone=ops burst=10 nodelay;
        proxy_pass http://django_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Request-ID $request_id;
        access_log off;
    }

    # ══════════════════════════════════════════════════════════════════════
    # Static & media (served directly by nginx)
    # ══════════════════════════════════════════════════════════════════════

    location /static/ {
        alias /static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /media/ {
        alias /media/;
        expires 7d;
        add_header Cache-Control "private";

        # Only serve known-safe evidence file types directly.
        location ~* \.(pdf|png|jpg|jpeg|gif|webp|doc|docx|xls|xlsx|csv|txt|md|json|log)$ {
            try_files $uri =404;
        }

        # Deny dotfiles and anything else uploaded to media/.
        location ~ /\. { deny all; }
        return 403;
    }

    # ══════════════════════════════════════════════════════════════════════
    # Auth (strict rate limit)
    # ══════════════════════════════════════════════════════════════════════
    location ~ ^/accounts/(login|signup)/ {
        limit_req zone=auth burst=5 nodelay;
        proxy_pass http://django_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Request-ID $request_id;
    }

    # ══════════════════════════════════════════════════════════════════════
    # Everything else — Django views
    # ══════════════════════════════════════════════════════════════════════
    location / {
        limit_req zone=app burst=20 nodelay;
        proxy_pass http://django_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Request-ID $request_id;
        proxy_read_timeout 120s;
    }

    # ══════════════════════════════════════════════════════════════════════
    # Performance
    # ══════════════════════════════════════════════════════════════════════
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 860;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        image/svg+xml;
}

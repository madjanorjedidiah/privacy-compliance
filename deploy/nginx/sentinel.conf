upstream sentinel_app {
    server web:8000;
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name mydataprotection.cocoatool.org;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    server_name mydataprotection.cocoatool.org;

    ssl_certificate     /etc/letsencrypt/live/mydataprotection.cocoatool.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mydataprotection.cocoatool.org/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256';
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1h;

    # Hardening headers (Django adds its own; keep these minimal).
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "same-origin" always;

    client_max_body_size 20m;  # evidence uploads
    gzip on;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml;

    location /static/ {
        alias /srv/sentinel/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /srv/sentinel/media/;
        expires 7d;
    }

    location /ops/health/ {
        proxy_pass http://sentinel_app;
        access_log off;
    }

    location / {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Request-ID $request_id;
        proxy_read_timeout 60s;
        proxy_pass http://sentinel_app;
    }
}
